<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Відновлення пароля — BP &amp; BMI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1729; color: #e8edf8;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px 20px;
    }
    .card {
      background: #1a2744; border: 1px solid #2a3f6f;
      border-radius: 18px; padding: 32px 28px;
      width: 100%; max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo-name { font-size: 24px; font-weight: 800; color: #e85249; }
    .logo-icon { font-size: 32px; margin-bottom: 8px; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #7a8fb5; margin-bottom: 20px; line-height: 1.45; }
    .field { margin-bottom: 12px; }
    input {
      width: 100%; padding: 11px 13px;
      background: #0f1729; border: 1.5px solid #2a3f6f;
      border-radius: 10px; color: #e8edf8; font-size: 14px;
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #e85249; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .pw-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #7a8fb5; font-size: 15px; padding: 4px; line-height: 1;
    }
    .pw-eye:hover { color: #e8edf8; }
    .pw-strength-bar { height: 3px; background: #2a3f6f; border-radius: 2px; margin: 3px 0 3px; }
    .pw-strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .25s, background .25s; }
    .pw-strength-label { font-size: 11px; min-height: 16px; margin-bottom: 10px; }
    .btn {
      width: 100%; padding: 13px;
      background: #e85249; color: #fff; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: default; }
    .error { display: none; color: #ef4444; font-size: 13px; margin-top: 12px; text-align: center; }
    .success { display: none; text-align: center; }
    .success .icon { font-size: 40px; margin-bottom: 12px; }
    .success h2 { margin-bottom: 8px; }
    .success p { font-size: 13px; color: #7a8fb5; margin-bottom: 20px; line-height: 1.5; }
    .link { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #7a8fb5; }
    .link a { color: #e85249; text-decoration: none; }
    .link a:hover { text-decoration: underline; }
    .invalid { display: none; text-align: center; }
    .invalid .icon { font-size: 40px; margin-bottom: 12px; }
    .invalid p { font-size: 13px; color: #7a8fb5; margin-bottom: 20px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔑</div>
      <div class="logo-name">BP &amp; BMI</div>
    </div>

    <!-- Invalid/expired token -->
    <div id="stateInvalid" class="invalid" style="display:none">
      <div class="icon">⚠️</div>
      <h2 style="margin-bottom:8px">Посилання недійсне</h2>
      <p>Це посилання вже використане або термін його дії вийшов (1 година).</p>
      <a href="/" class="btn" style="display:block;text-decoration:none;text-align:center">На головну</a>
    </div>

    <!-- Form -->
    <div id="stateForm">
      <h2>Новий пароль</h2>
      <p class="subtitle">Введіть новий пароль для вашого акаунта</p>
      <div class="field pw-wrap">
        <input type="password" id="pwInput" placeholder="Новий пароль (мін. 8 символів)"
          autocomplete="new-password"
          oninput="updateStrength(this.value)"
          onkeyup="updateStrength(this.value)"
          onkeydown="if(event.key==='Enter')submitReset()" />
        <button class="pw-eye" type="button" onclick="togglePw()" tabindex="-1" aria-label="Показати/приховати пароль">👁</button>
      </div>
      <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwFill"></div></div>
      <div class="pw-strength-label" id="pwLabel"></div>
      <button class="btn" id="btnSubmit" onclick="submitReset()">Зберегти пароль</button>
      <div class="error" id="errMsg"></div>
    </div>

    <!-- Success -->
    <div id="stateSuccess" class="success" style="display:none">
      <div class="icon">✅</div>
      <h2>Пароль змінено!</h2>
      <p>Тепер ви можете увійти з новим паролем.</p>
      <a href="/" class="btn" style="display:block;text-decoration:none;text-align:center">Увійти</a>
    </div>

    <p class="link"><a href="/">← Назад до входу</a></p>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('stateForm').style.display = 'none';
      document.getElementById('stateInvalid').style.display = 'block';
    }

    function togglePw() {
      const inp = document.getElementById('pwInput');
      const btn = inp.nextElementSibling;
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
    }

    function updateStrength(val) {
      const fill = document.getElementById('pwFill');
      const label = document.getElementById('pwLabel');
      if (!val) { fill.style.width = '0'; label.textContent = ''; return; }
      const hasNum = /\d/.test(val);
      const hasSym = /[^a-zA-Z0-9Ѐ-ӿ]/.test(val);
      let score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 8 && hasNum) score++;
      if (val.length >= 8 && hasSym) score++;
      const levels = [
        ['25%', '#ef4444', val.length < 8 ? 'Мін. 8 символів' : 'Слабкий'],
        ['50%', '#fb923c', 'Помірний'],
        ['75%', '#fbbf24', 'Хороший'],
        ['100%', '#22c55e', 'Сильний'],
      ];
      const [w, bg, text] = levels[Math.min(score, 3)];
      fill.style.width = w;
      fill.style.background = bg;
      label.style.color = bg;
      label.textContent = text;
    }

    async function submitReset() {
      const password = document.getElementById('pwInput').value;
      const errEl = document.getElementById('errMsg');
      errEl.style.display = 'none';
      if (password.length < 8) {
        errEl.textContent = 'Пароль має містити мінімум 8 символів';
        errEl.style.display = 'block';
        return;
      }
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.textContent = '…';
      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await r.json();
        if (!r.ok) {
          errEl.textContent = data.error || 'Помилка';
          errEl.style.display = 'block';
          if (r.status === 400 && data.error?.includes('недійсне')) {
            document.getElementById('stateForm').style.display = 'none';
            document.getElementById('stateInvalid').style.display = 'block';
          }
          return;
        }
        document.getElementById('stateForm').style.display = 'none';
        document.getElementById('stateSuccess').style.display = 'block';
      } catch {
        errEl.textContent = 'Помилка мережі. Спробуйте ще раз.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Зберегти пароль';
      }
    }
  </script>
</body>
</html>
